<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xiyaaa</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* 🌿 基础 */
body {
  margin:0;
  font-family: 'Noto Sans SC', sans-serif;
  background:#F7F7F5;
  color:#2F2F2F;
  line-height:1.8;
}

/* 🌱 intro */
#intro {
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#F7F7F5;
  z-index:9999;
}

#treeSVG {
  width:100px;
  opacity:0;
}

/* 🌿 主体 */
#main {
  opacity:0;
  transition:opacity 1s ease;
}

body.loaded #main {
  opacity:1;
}

body.loaded #intro {
  opacity:0;
  pointer-events:none;
  transition:opacity 1s ease;
}

.container {
  max-width:900px;
  margin:auto;
  padding:80px 20px;
}

/* 🌟 Hero */
.hero {
  margin-bottom:120px;
}

.hero h1 {
  font-size:44px;
  font-weight:500;
  margin-bottom:20px;
}

.hero p {
  max-width:520px;
  color:#6B6B6B;
}

/* 🌿 section */
.section {
  margin-bottom:120px;
}

.section h2 {
  font-size:20px;
  margin-bottom:20px;
  color:#8A8A8A;
}

/* 🌿 项目 */
.project {
  margin-bottom:40px;
}

.project-title {
  font-size:18px;
  font-weight:500;
}

.project-desc {
  color:#8A8A8A;
}

/* 🌿 能力标签 */
.tags {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.tag {
  padding:6px 12px;
  border-radius:20px;
  background:#EAEDEA;
  font-size:13px;
}

/* 🌿 联系 */
.contact p {
  margin:6px 0;
}

/* 🌬 动画 */
.fade-up {
  opacity:0;
  transform:translateY(40px);
  transition:all 1s ease;
}

.fade-up.show {
  opacity:1;
  transform:translateY(0);
}

</style>
</head>

<body>

<!-- 🌱 树动画 -->
<div id="intro">
<svg id="treeSVG" viewBox="0 0 500 500">
  <path id="trunk"
    d="M250 400 C260 300 240 260 250 180"
    stroke="#5A4A42"
    stroke-width="6"
    fill="none"
  />
  <circle class="leaf" cx="250" cy="140" r="0" fill="#CDE7D8"/>
  <circle class="leaf" cx="210" cy="160" r="0" fill="#DFF3E6"/>
  <circle class="leaf" cx="290" cy="160" r="0" fill="#DFF3E6"/>
</svg>
</div>

<!-- 🌿 主体 -->
<div id="main">

<div class="container">

<!-- 🌟 1. 我是谁 -->
<section class="hero fade-up">
  <h1>Hi, I'm 张东洋</h1>
  <p>
    我对「情绪价值」与「品牌表达」高度敏感。<br>
    我习惯从文化与感受出发，去理解一个品牌，并尝试让它变得更有温度。
  </p>
</section>

<!-- 🌿 2. 我在做什么 -->
<section class="section fade-up">
  <h2>我在做什么</h2>
  <p>
    我正在探索如何把抽象的情绪，转化为可以被感知的品牌体验。
  </p>
</section>

<!-- 🌿 3. 成长轨迹（项目） -->
<section class="section fade-up">
  <h2>成长轨迹</h2>

  <div class="project">
    <div class="project-title">Needoog需要小狗</div>
    <div class="project-desc">情绪陪伴型品牌构建 · 全国一等奖</div>
  </div>

  <div class="project">
    <div class="project-title">李白故里诗意之旅</div>
    <div class="project-desc">沉浸式文化体验设计 · 全国二等奖</div>
  </div>

  <div class="project">
    <div class="project-title">谪仙人动漫策划</div>
    <div class="project-desc">AI驱动文化表达 · 省级一等奖</div>
  </div>

</section>

<!-- 🌿 4. 能力 -->
<section class="section fade-up">
  <h2>能力</h2>

  <div class="tags">
    <div class="tag">品牌策略</div>
    <div class="tag">内容策划</div>
    <div class="tag">情绪洞察</div>
    <div class="tag">视觉表达</div>
    <div class="tag">AI创作</div>
  </div>

</section>

<!-- 🌿 5. 联系 -->
<section class="section contact fade-up">
  <h2>联系我</h2>
  <p>邮箱：xygz1313699@163.com</p>
  <p>电话：13271339987</p>
  <p style="margin-top:10px;color:#8A8A8A;">
    如果你对情绪表达或品牌故事感兴趣，我们可以聊聊。
  </p>
</section>

</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script>

// 🌱 树动画
const trunk = document.querySelector("#trunk");
const leaves = document.querySelectorAll(".leaf");
const tree = document.querySelector("#treeSVG");

const length = trunk.getTotalLength();
trunk.style.strokeDasharray = length;
trunk.style.strokeDashoffset = length;

const tl = gsap.timeline();

tl.to(tree, {opacity:1, scale:0.6, duration:0.3});
tl.to(trunk, {strokeDashoffset:0, duration:0.7});
tl.to(leaves, {attr:{r:35}, duration:0.6, stagger:0.08}, "-=0.3");
tl.to(tree, {scale:1.6, duration:0.6}, "-=0.4");

tl.to("#intro", {
  opacity:0,
  duration:0.6,
  onComplete:()=>document.body.classList.add("loaded")
});

// 🌬 滚动动画
const items = document.querySelectorAll(".fade-up");

window.addEventListener("scroll", () => {
  items.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if (top < window.innerHeight - 60) {
      el.classList.add("show");
    }
  });
});

</script>

</body>
</html>
